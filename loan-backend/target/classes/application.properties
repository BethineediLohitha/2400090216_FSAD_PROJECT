app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
